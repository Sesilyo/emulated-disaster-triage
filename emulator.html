<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <link rel="stylesheet" href="stylings/emulator.css">
        
        <title>EMULATOR PAGE</title>
    </head>
    <body>
        <div id="emulation-container">
            <h1 id="emulation-title">EMULATION PAGE</h1>
            
            <div id="panel-container">

                <!-- PANEL FOR SENDER -->
                <div id="sender-panel" class="panel-emulation">
                    <h2>Sender Panel</h2>
                    
                    <div id="sender-screen">
                        <div id="upper-screen">
                            <!-- HOUSE ID SUBMISSION -->
                            
                            <!-- STATUS BUTTONS -->
                            <div id="buttons-div">
                                <button type="button" onclick="status('SAFE')">SAFE</button>
                                <button type="button" onclick="status('EVACUATED')">EVACUATED</button>
                                <button type="button" onclick="status('IMMEDIATE HELP')">IMMEDIATE HELP</button>
                            </div>
                        </div>
                        <div id="lower-screen">
                            <!-- LOCAL SENT LOG -->
                            <div id="sent-log">
                                <h3>Sent Log</h3>
                            </div>
                            <div id="scrollable">
                                <ul id="entry-list">
                                    <li>Entry 1</li>
                                    <li>Entry 2</li>
                                    <li>Entry 3</li>
                                    <li>Entry 4</li>
                                    <li>Entry 5</li>
                                    <li>Entry 6</li>
                                    <li>Entry 7</li>
                                    <li>[TIME] - [] - TO CID</li>
                                    </ul>
                            </div>
                        </div>
                    </div>

                    <!-- selection of HOUSE ID constants for emulation purposes -->
                    <div id="house-id-div">
                        <select id="house-id-dropdown">
                            <option value="">Select an option</option>
                        </select>
                    </div>
                
                </div>
                
                
                <!-- PANEL FOR RECEIVER -->
                <div id="receiver-panel" class="panel-emulation">
                    <h2>Receiver Panel</h2>
                    
                    <!-- UPDATES FROM SENDER PANEL DISPLAYS HERE -->
                    <div id="receiver-screen">
                        
                        <!-- BROADCAST UPDATE DISPLAYS HERE -->
                        <div id="updates-div">
                            <!-- initial hardcoded updates-->
                            <!-- if u guys wanna tackle the JS of updates later go lang -->
                            <div id="scrollable">
                               <ul id="updates-list"></ul> 
                            </div>
                            
                        </div>
                        
                        <!-- TRIAGE COUNTER DISPLAYS HERE -->
                        <div id="counter-div">
                            
                            <div id="unknown-counter" class="counter-elements">
                                <p>UNKNOWN: </p>
                                <output id="unknown-output">0</output>
                            </div>

                            <div id="safe-counter" class="counter-elements">
                                <p>SAFE: </p>
                                <output id="safe-output">0</output>
                            </div>

                            <div id="safe-counter" class="counter-elements">
                                <p>EVACUATED: </p>
                                <output id="evacuated-output">0</output>
                            </div>

                            <div id="safe-counter" class="counter-elements">
                                <p>IMMEDIATE HELP: </p>
                                <output id="immediate-help-output">0</output>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- SCRIPTS -->
        <script src="./scripts/send-log.js"></script>
        

    </body>
</html>
