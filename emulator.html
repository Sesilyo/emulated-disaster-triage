<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <link rel="stylesheet" href="stylings/emulator.css">
        
        <title>EMULATOR PAGE</title>
    </head>
    <body>
        <div id="emulation-container">
            <h1 id="emulation-title">EMULATION PAGE</h1>
            
            <div id="panel-container">

                <!-- PANEL FOR SENDER -->
                <div id="sender-panel" class="panel-emulation">
                    <h2>Sender Panel</h2>
                    
                    <div id="sender-screen">
                        <div id="upper-screen">
                            <h3 id="app-name">kalApp</h3>

                            <!-- HOUSE ID SUBMISSION -->
                            
                            <!-- STATUS BUTTONS -->
                            <div id="buttons-div">
                                <button type="button" onclick="status('URGENT')">
                                    <img src="images/warning_icon.png">
                                    URGENT
                                </button>
                                <button type="button" onclick="status('EVACUATED')">
                                    <img src="images/exit_icon.png">
                                    EVACUATED
                                </button>
                                <button type="button" onclick="status('SAFE')">
                                    <img src="images/safe_icon.png">
                                    SAFE
                                </button>
                            </div>
                        </div>

                        <div id="lower-screen">
                            <!-- LOCAL SENT LOG -->

                            <div id="scrollable">
                                <table id="entry-table">
                                    <thead class="entry-head">
                                        <tr>
                                            <th>Time</th>
                                            <th>Status</th>
                                            <th>User</th>
                                        </tr>
                                    </thead>
                                    <tbody id="entry-body">
                                        <!-- populated by scripts/send-log.js -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- selection of HOUSE ID constants for emulation purposes -->
                    <div id="house-id-div">
                        <select id="house-id-dropdown">
                            <option value="">Select an option</option>
                        </select>
                    </div>
                
                </div>
                
                
                <!-- PANEL FOR RECEIVER -->
                <div id="receiver-panel" class="panel-emulation">
                    <h2>Receiver Panel</h2>
                    
                    <!-- UPDATES FROM SENDER PANEL DISPLAYS HERE -->
                    <div id="receiver-screen">
                        
                        <!-- BROADCAST UPDATE DISPLAYS HERE -->
                        <div id="updates-div" >
                            <!-- initial hardcoded updates-->
                            <!-- created table to link temp hardcoded data in JS for now -->
                            <h3>Update Log</h3>
                            <hr>
                            <table id="log-table">
                                <thead class="log-head">
                                    <tr>
                                        <th>Date</th>
                                        <th>Time</th>
                                        <th>House ID</th>
                                        <th>Status</th>
                                        <th>Respond</th>
                                    </tr>
                                </thead>
                                <tbody id="log-body">
                                    <!-- populated by scripts/receive-log.js -->
                                </tbody>
                            </table>
                            <!-- if u guys wanna tackle the JS of updates later go lang -->
                            <div id="scrollable">
                               <ul id="updates-list"></ul> 
                            </div>
                            
                        </div>
                        
                        <!-- TRIAGE COUNTER DISPLAYS HERE -->
                        <div id="counter-div">
                            <h4>Status Counter</h4>

                            <div id="counter-row">
                                <div class="counter-item">
                                    <span class="counter-label unknown">UNKNOWN</span>
                                    <output id="unknown-output">100,000</output>
                                </div>
                                <div class="counter-item">
                                    <span class="counter-label urgent">URGENT</span>
                                    <output id="urgent-output">67</output>
                                </div>
                                <div class="counter-item">
                                    <span class="counter-label evacuated">EVACUATED</span>
                                    <output id="evacuated-output">68</output>
                                </div>
                                <div class="counter-item">
                                    <span class="counter-label safe">SAFE</span>
                                    <output id="safe-output">69</output>
                                </div>
                                </div>
                                <div id="dispatched-row">
                                    <span class="counter-label dispatched">DISPATCHED</span>
                                    <output id="dispatched-output">0</output>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        <!-- SCRIPTS -->
        <script src="./scripts/send-log.js"></script>
        <script src="./scripts/receive-log.js"></script>

    </body>
</html>
